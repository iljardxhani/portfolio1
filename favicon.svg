<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#050c14"/>

  <!-- Antenna stem -->
  <rect x="14.5" y="2" width="3" height="5" rx="1.5" fill="#25e3b4"/>
  <!-- Antenna tip glow -->
  <circle cx="16" cy="2.5" r="2.5" fill="#12d4ff" opacity="0.9"/>
  <circle cx="16" cy="2.5" r="1.2" fill="#fff" opacity="0.6"/>

  <!-- Head panel -->
  <rect x="4" y="8" width="24" height="20" rx="4" fill="#0a1628"/>
  <rect x="4" y="8" width="24" height="20" rx="4" fill="none" stroke="#12d4ff" stroke-width="1" opacity="0.5"/>

  <!-- Left eye -->
  <rect x="7" y="13" width="7" height="5" rx="1.5" fill="#12d4ff"/>
  <rect x="8.5" y="14.2" width="3" height="2.8" rx="0.8" fill="#fff" opacity="0.35"/>

  <!-- Right eye -->
  <rect x="18" y="13" width="7" height="5" rx="1.5" fill="#12d4ff"/>
  <rect x="19.5" y="14.2" width="3" height="2.8" rx="0.8" fill="#fff" opacity="0.35"/>

  <!-- Mouth: three dots -->
  <circle cx="12" cy="23.5" r="1.3" fill="#25e3b4"/>
  <circle cx="16" cy="23.5" r="1.3" fill="#25e3b4"/>
  <circle cx="20" cy="23.5" r="1.3" fill="#25e3b4"/>
</svg>
